name: App Node CI

on:
  push:
    branches: [main, master]
    paths:
      - "app-node/**"
  pull_request:
    branches: [main, master]
    paths:
      - "app-node/**"

jobs:
  test:
    name: Lint, SAST & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app-node/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: app-node

      - name: Lint (ESLint)
        run: npx eslint src/ --ext .js,.ts
        working-directory: app-node
        continue-on-error: true

      - name: SAST (njsscan)
        uses: ajinabraham/njsscan-action@master
        with:
          args: app-node/src/

      - name: Run Unit Tests
        run: npm test
        working-directory: app-node
