name: Deploy Monitoring Stack

on:
  push:
    branches: [main, master]
    paths:
      - "modules/**"
      - "deploy/**"
      - "alerts/**"
  pull_request:
    branches: [main, master]
    paths:
      - "modules/**"
      - "deploy/**"
  workflow_dispatch:
    inputs:
      command:
        description: "Command to run"
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  id-token: write
  contents: read

env:
  TERRAFORM_VERSION: "1.9.8"
  TERRAGRUNT_VERSION: "0.72.0"

defaults:
  run:
    shell: bash
    working-directory: deploy/environments/dev

jobs:
  ci:
    name: CI / Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.inputs.command == 'plan'

    steps:
      - uses: actions/checkout@v4

      - name: TruffleHog (Secrets)
        uses: trufflesecurity/trufflehog@v3
        with:
          extra_args: --only-verified

      - name: Checkov (IaC Security)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes,helm
          quiet: true

      - name: TFSec (Terraform)
        uses: aquasecurity/tfsec-action@v1
        with:
          soft_fail: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt_version: ${{ env.TERRAGRUNT_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terragrunt Plan (All)
        run: |
          terragrunt run-all plan \
            --terragrunt-non-interactive \
            -detailed-exitcode 2>&1

  cd:
    name: CD / Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'apply'
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt_version: ${{ env.TERRAGRUNT_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terragrunt Run-All Apply
        run: terragrunt run-all apply --terragrunt-non-interactive
