apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-app
  namespace: monitoring
  labels:
    app: observability-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observability-app
  template:
    metadata:
      labels:
        app: observability-app
      annotations:
        sidecar.opentelemetry.io/inject: "true"
        instrumentation.opentelemetry.io/inject-nodejs: "true"
    spec:
      containers:
        - name: app
          image: ghcr.io/edsonmichaque/observability-app:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: OTEL_SERVICE_NAME
              value: "observability-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc.cluster.local:4317"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: observability-app
  namespace: monitoring
spec:
  selector:
    app: observability-app
  ports:
    - port: 3000
      targetPort: 3000
