global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alertmanager@gmail.com'
  smtp_auth_username: '${smtp_user}'
  smtp_auth_password: '${smtp_password}'
  smtp_require_tls: true

route:
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        severity: warning
      receiver: 'warning'
      continue: true

receivers:
  - name: 'default'
    email_configs:
      - to: '${alert_email}'
        send_resolved: true
        headers:
          subject: '[ALERT] {{ .GroupLabels.alertname }} - {{ .Status }}'

  - name: 'critical'
    email_configs:
      - to: '${alert_email}'
        send_resolved: true
        headers:
          subject: '[CRITICAL] {{ .GroupLabels.alertname }} - {{ .Status }}'
    telegram_configs:
      - bot_token: '${telegram_bot_token}'
        chat_id: ${telegram_chat_id}
        send_resolved: true
        parse_mode: 'HTML'
        message: |
          <b>[CRITICAL] {{ .GroupLabels.alertname }}</b>
          {{ .Annotations.description }}
          <b>Severity:</b> {{ .Labels.severity }}
          <b>Status:</b> {{ .Status }}
          <b>Start:</b> {{ .StartsAt.Format "02/01/2006 15:04:05" }}

  - name: 'warning'
    email_configs:
      - to: '${alert_email}'
        send_resolved: true
        headers:
          subject: '[WARNING] {{ .GroupLabels.alertname }} - {{ .Status }}'
