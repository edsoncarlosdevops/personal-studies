groups:
  - name: pods
    interval: 30s
    rules:
      - alert: PodCrashLoopBackOff
        expr: |
          kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Pod CrashLoopBackOff: {{ $labels.namespace }}/{{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} is restarting in a loop (CrashLoopBackOff)."

      - alert: PodRestartHigh
        expr: |
          increase(kube_pod_container_status_restarts_total[30m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High pod restarts: {{ $labels.namespace }}/{{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} restarted more than 3 times in the last 30 minutes."

      - alert: PodNotReady
        expr: |
          kube_pod_status_ready{condition="false"} > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod not ready: {{ $labels.namespace }}/{{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} has not been ready for more than 5 minutes."

  - name: resources
    interval: 30s
    rules:
      - alert: HighCPUUsage
        expr: |
          sum(rate(container_cpu_usage_seconds_total{namespace!=""}[5m])) by (namespace, container) / 
          sum(kube_pod_container_resource_requests{resource="cpu"}) by (namespace, container) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU: {{ $labels.namespace }}/{{ $labels.container }}"
          description: "Container {{ $labels.container }} in {{ $labels.namespace }} is using >80% of CPU request for over 10 minutes."

      - alert: HighMemoryUsage
        expr: |
          sum(container_memory_working_set_bytes{namespace!=""}) by (namespace, container) /
          sum(kube_pod_container_resource_requests{resource="memory"}) by (namespace, container) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory: {{ $labels.namespace }}/{{ $labels.container }}"
          description: "Container {{ $labels.container }} in {{ $labels.namespace }} is using >80% of memory request for over 10 minutes."

      - alert: NodeDiskSpace
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 20
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Node disk low: {{ $labels.node }}"
          description: "Node {{ $labels.node }} has less than 20% disk space available."

  - name: application
    interval: 30s
    rules:
      - alert: HighRequestLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_duration_seconds_bucket[5m])) by (le, service_name)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency: {{ $labels.service_name }}"
          description: "P95 latency for {{ $labels.service_name }} is above 500ms for over 5 minutes."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_duration_seconds_count{status_code=~"5.."}[5m])) by (service_name) /
          sum(rate(http_server_duration_seconds_count[5m])) by (service_name) * 100 > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate: {{ $labels.service_name }}"
          description: "Service {{ $labels.service_name }} has >5% HTTP 5xx errors in the last 5 minutes."

      - alert: PrometheusTargetDown
        expr: |
          up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus target down: {{ $labels.job }}/{{ $labels.instance }}"
          description: "Target {{ $labels.job }} ({{ $labels.instance }}) has been unreachable for over 2 minutes."
