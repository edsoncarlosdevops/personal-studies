# Azure Pipeline - Infrastructure Validation & Reports

trigger:
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

steps:
- bash: |
    echo "=========================================="
    echo " Pipeline: Observability Stack Validation"
    echo " Repo: personal-studies"
    echo " Branch: $(Build.SourceBranch)"
    echo " Commit: $(Build.SourceVersion)"
    echo "=========================================="
  displayName: 'Build info'

- bash: |
    # Install Terraform (linux amd64)
    wget -q https://releases.hashicorp.com/terraform/1.10.0/terraform_1.10.0_linux_amd64.zip -O terraform.zip
    unzip -q terraform.zip
    sudo mv terraform /usr/local/bin/
    rm terraform.zip
    
    echo "Terraform installed:"
    terraform --version
  displayName: 'Install Terraform'

- bash: |
    echo "Validating Terraform modules..."

    for dir in \
      azure/observability-stack-azure/modules/aks \
      azure/observability-stack-azure/deploy/environments/dev/tf \
      azure/observability-stack-azure/bootstrap; 
    do
      echo "--- Checking $dir ---"
      cd "$(Build.SourcesDirectory)/$dir"
      terraform init -backend=false 2>/dev/null
      
      terraform fmt -check -recursive
      if [ $? -eq 0 ]; then
        echo "  Format: OK"
      else
        echo "  Format: NEEDS FIX (run 'terraform fmt')"
      fi
      
      terraform validate
      if [ $? -eq 0 ]; then
        echo "  Validate: OK"
      else
        echo "  Validate: FAILED"
      fi
      echo ""
    done
  displayName: 'Validate all Terraform modules'

- bash: |
    echo "Project structure:"
    echo ""
    tree azure/observability-stack-azure/ --dirsfirst -I '.terraform*|.terragrunt*|*.tfstate*'
  displayName: 'Show project structure'