# Azure Pipeline - AKS connectivity & Helm deploy

trigger:
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

variables:
  azureSubscription: 'azure-pipeline-observability-key'
  resourceGroup: 'rg-observability'
  aksCluster: 'aks-observability'

steps:
- task: AzureCLI@2
  displayName: 'Check AKS cluster status'
  inputs:
    azureSubscription: '$(azureSubscription)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      az aks show \
        --resource-group $(resourceGroup) \
        --name $(aksCluster) \
        --query "{name:name, state:provisioningState, k8s:kubernetesVersion}" \
        --output table

- task: AzureCLI@2
  displayName: 'Get kubeconfig and list namespaces'
  inputs:
    azureSubscription: '$(azureSubscription)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      az aks get-credentials \
        --resource-group $(resourceGroup) \
        --name $(aksCluster) \
        --admin \
        --overwrite-existing \
        --file kubeconfig

      export KUBECONFIG=kubeconfig

      echo "=== Nodes ==="
      kubectl get nodes

      echo ""
      echo "=== Namespaces ==="
      kubectl get namespaces

      echo ""
      echo "=== Pods in monitoring ==="
      kubectl get pods -n monitoring

- task: AzureCLI@2
  displayName: 'Check Helm releases in monitoring'
  inputs:
    azureSubscription: '$(azureSubscription)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      az aks get-credentials \
        --resource-group $(resourceGroup) \
        --name $(aksCluster) \
        --admin \
        --overwrite-existing \
        --file kubeconfig

      export KUBECONFIG=kubeconfig

      echo "=== Helm releases ==="
      helm list -n monitoring || echo "Helm not installed or no releases"