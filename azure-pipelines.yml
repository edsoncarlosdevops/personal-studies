# Azure Pipeline - Infrastructure Validation & Reports

trigger:
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

steps:
- bash: |
    echo "=========================================="
    echo " Pipeline: Observability Stack Validation"
    echo " Repo: personal-studies"
    echo " Branch: $(Build.SourceBranch)"
    echo " Commit: $(Build.SourceVersion)"
    echo "=========================================="
  displayName: 'Build info'

- bash: |
    # Install tools
    wget -q https://releases.hashicorp.com/terraform/1.10.0/terraform_1.10.0_linux_amd64.zip
    unzip -q terraform.zip
    sudo mv terraform /usr/local/bin/
    
    wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v0.71.0/terragrunt_linux_arm64 -O terragrunt
    chmod +x terragrunt
    sudo mv terragrunt /usr/local/bin/
    
    echo "Tools installed:"
    terraform --version
    terragrunt --version
  displayName: 'Install Terraform + Terragrunt'

- bash: |
    echo "Validating Terraform modules..."
    
    for dir in \
      azure/observability-stack-azure/modules/aks \
      azure/observability-stack-azure/deploy/environments/dev/tf \
      azure/observability-stack-azure/bootstrap; 
    do
      echo "--- Checking $dir ---"
      cd "$(Build.SourcesDirectory)/$dir"
      terraform init -backend=false 2>/dev/null
      terraform fmt -check -recursive && echo "  Format: OK" || echo "  Format: NEEDS FIX"
      terraform validate && echo "  Validate: OK" || echo "  Validate: FAILED"
      echo ""
    done
  displayName: 'Validate all Terraform modules'

- bash: |
    echo "Project structure:"
    echo ""
    echo "azure/observability-stack-azure/"
    ls -la azure/observability-stack-azure/
    echo ""
    echo "Monitoring components:"
    ls -d azure/observability-stack-azure/deploy/environments/dev/monitoring/*/
  displayName: 'Show project structure'