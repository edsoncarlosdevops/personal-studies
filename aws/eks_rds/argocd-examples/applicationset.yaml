apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guestbook
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: engineering
            url: https://kubernetes.default.svc
          - name: production
            url: https://kubernetes.default.svc
  template:
    metadata:
      name: "{{name}}-guestbook"
    spec:
      project: default
      source:
        repoURL: https://github.com/edsoncarlosdevops/personal-studies.git
        targetRevision: HEAD
        path: "aws/eks_rds/argocd-examples/apps/{{name}}"
      destination:
        server: "{{url}}"
        namespace: "guestbook-{{name}}"
