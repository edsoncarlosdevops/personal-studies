# --- Configurações de Nível Raiz (IMPORTANTE: Não indentar) ---
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  
  commonConfig:
    replication_factor: 1
    path_prefix: /tmp/loki

  # Armazenamento no disco local (Filesystem)
  storage:
    type: "filesystem"
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules
  
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

# --- Configuração do Modo SingleBinary ---
singleBinary:
  replicas: 1
  persistence:
    enabled: false

  # Recursos leves para EKS
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

# --- Desabilitar explicitamente componentes distribuídos ---
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
gateway:
  enabled: false
resultsCache:
  enabled: false
chunksCache:
  enabled: false

