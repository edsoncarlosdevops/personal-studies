---
- name: Windows Baseline Configuration
  hosts: windows_workstations
  gather_facts: yes
  vars:
    timezone: "E. South America Standard Time"

  tasks:
    - name: Set timezone to Brasília
      ansible.windows.win_timezone:
        timezone: "{{ timezone }}"
      tags: timezone

    - name: Install critical Windows Updates
      ansible.windows.win_updates:
        category_names:
          - CriticalUpdates
          - SecurityUpdates
          - UpdateRollups
        reboot: yes
        reboot_timeout: 600
      tags: updates

    - name: Configure Windows Firewall rules
      ansible.windows.win_firewall_rule:
        name: "Allow {{ item.name }}"
        localport: "{{ item.port }}"
        action: allow
        direction: in
        protocol: "{{ item.protocol | default('tcp') }}"
        state: present
        enabled: yes
      loop:
        - { name: "WinRM HTTP", port: 5985 }
        - { name: "RDP", port: 3389 }
        - { name: "ICMPv4", port: any, protocol: icmpv4 }
        - { name: "Prometheus Exporter", port: 9182 }
      tags: firewall

    - name: Enable PowerShell Script Block Logging
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging
        name: EnableScriptBlockLogging
        data: 1
        type: dword
        state: present
      tags: security

    - name: Enable PowerShell Module Logging
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ModuleLogging
        name: EnableModuleLogging
        data: 1
        type: dword
        state: present
      tags: security

    - name: Configure WinRM for Ansible
      ansible.windows.win_shell: |
        winrm set winrm/config/winrs '@{MaxMemoryPerShellMB="2048"}'
        winrm set winrm/config/service '@{AllowUnencrypted="true"}'
        winrm set winrm/config/service/auth '@{Basic="true"}'
      tags: winrm

    - name: Enable RDP
      ansible.windows.win_shell: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
        Enable-NetFirewallRule -DisplayGroup 'Remote Desktop'
      tags: rdp

    - name: Create admin tools directory
      ansible.windows.win_file:
        path: C:\Tools
        state: directory
      tags: tools

    - name: Reboot if required
      ansible.windows.win_reboot:
        reboot_timeout: 600
      when: win_updates_result is defined and win_updates_result.reboot_required
      tags: reboot

    - name: Gather system info
      ansible.windows.win_shell: |
        $os = Get-CimInstance Win32_OperatingSystem
        [PSCustomObject]@{
            Hostname     = $env:COMPUTERNAME
            OS           = $os.Caption
            Version      = $os.Version
            LastBoot     = $os.LastBootUpTime
            Uptime       = (Get-Date) - $os.LastBootUpTime
            PowerShell   = $PSVersionTable.PSVersion
            WinRM        = (Get-Service -Name WinRM).Status
        } | ConvertTo-Json
      register: system_info
      tags: verify

    - name: Display system info
      debug:
        msg: "{{ system_info.stdout }}"
      tags: verify
