# OpenTelemetryCollector - Modo Sidecar
# =====================================================================
# Este recurso e usado pelo OTEL Operator para injetar um collector
# sidecar nos pods que tem a annotation:
#   sidecar.opentelemetry.io/inject: "true"
#
# O sidecar recebe dados OTLP do container principal e repassa para
# o Collector centralizado (que envia ao Tempo e Prometheus).
#
# [ATENCAO] O Operator PRECISA de um OpenTelemetryCollector no mesmo
# namespace do pod para injetar o sidecar. Sem isso, o webhook falha
# com erro: "no OpenTelemetry Collector instances available"
#
# Fluxo: App -> sidecar (:4317) -> Collector centralizado -> Tempo/Prometheus
apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: otel-sidecar
  namespace: otel-test
spec:
  mode: sidecar
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024
    exporters:
      otlp:
        endpoint: opentelemetry-collector.monitoring.svc.cluster.local:4317
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp]
