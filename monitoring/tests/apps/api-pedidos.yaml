# =====================================================================
# API de Pedidos - Exemplo de auto-instrumentacao Python
# =====================================================================
# APENAS PARA TESTE - Este deployment demonstra o uso da annotation
# de auto-instrumentation do OTEL Operator.
#
# Pre-requisito: O recurso Instrumentation (python-instrumentation)
# precisa existir no mesmo namespace. Ele e gerenciado pelo modulo:
#   monitoring/modules/observability/opentelemetry-operator/config/
#
# Annotation chave:
#   instrumentation.opentelemetry.io/inject-python: "true"
# Isso faz o Operator injetar um init container com o agente OTel Python
# que captura traces automaticamente do Flask - sem modificar codigo.
#
# Para testar:
#   ./monitoring/tests/setup-lab.sh
#
# TODO: Conectar no RDS PostgreSQL
# ================================================================
# UTILIDADE DO RDS NESTE PROJETO:
# O RDS PostgreSQL foi provisionado em aws/eks_rds/modules/rds/
# mas a app api-pedidos AINDA NAO consome ele.
#
# Ideias para popular o RDS via app:
#
# 1. Adicionar variaveis de ambiente no Deployment:
#    DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS
#    (ler do secret que o modulo app-rds cria)
#
# 2. No app.py, importar psycopg2 e conectar no banco:
#    import psycopg2
#    conn = psycopg2.connect(
#        host=os.getenv("DB_HOST"),
#        port=os.getenv("DB_PORT"),
#        dbname=os.getenv("DB_NAME"),
#        user=os.getenv("DB_USER"),
#        password=os.getenv("DB_PASS")
#    )
#
# 3. Criar tabela de pedidos (se nao existir):
#    CREATE TABLE IF NOT EXISTS pedidos (
#        id SERIAL PRIMARY KEY,
#        cliente VARCHAR(100),
#        total DECIMAL(10,2),
#        status VARCHAR(20),
#        criado_em TIMESTAMP DEFAULT NOW()
#    );
#
# 4. ATUALIZAR endpoints para usar o banco:
#
#    GET  /api/pedidos        -> SELECT * FROM pedidos
#    GET  /api/pedidos/:id    -> SELECT * FROM pedidos WHERE id=:id
#    POST /api/checkout       -> INSERT INTO pedidos (cliente, total, status) VALUES (:cliente, :total, 'criado')
#
# 5. Criar endpoint para popular dados de teste:
#    POST /api/seed?quantidade=100
#    -> Insere N pedidos aleatorios no banco
#
# 6. Beneficio para Observabilidade:
#    - Traces vao mostrar spans do banco (SELECT, INSERT)
#    - Logs vao mostrar queries executadas
#    - Metricas de latencia do banco via OTel
#    - Dashboard pode mostrar total de pedidos, pedidos/dia, etc
# ================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-pedidos
  namespace: otel-test
data:
  app.py: |
    from flask import Flask, jsonify, request
    import random, time

    app = Flask(__name__)

    PEDIDOS = [
        {"id": 1, "cliente": "Joao", "total": 150.0, "status": "entregue"},
        {"id": 2, "cliente": "Maria", "total": 89.90, "status": "processando"},
    ]

    @app.route("/api/pedidos")
    def listar_pedidos():
        time.sleep(random.uniform(0.01, 0.1))
        return jsonify(PEDIDOS)

    @app.route("/api/pedidos/<int:id>")
    def buscar_pedido(id):
        time.sleep(random.uniform(0.02, 0.2))
        pedido = next((p for p in PEDIDOS if p["id"] == id), None)
        if not pedido:
            return jsonify({"erro": "nao encontrado"}), 404
        return jsonify(pedido)

    @app.route("/api/checkout", methods=["POST"])
    def checkout():
        dados = request.get_json()
        time.sleep(random.uniform(0.1, 0.5))
        if not dados or "cliente" not in dados:
            return jsonify({"erro": "cliente obrigatorio"}), 400
        return jsonify({"pedido_id": 3, "status": "criado"}), 201

    if __name__ == "__main__":
        app.run(host="0.0.0.0", port=5000)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-pedidos
  namespace: otel-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-pedidos
  template:
    metadata:
      labels:
        app: api-pedidos
      annotations:
        # [ATENCAO] Auto-instrumentation Python
        # O Operator injeta init container que copia o agente OTel
        # e configura OTEL_EXPORTER_OTLP_ENDPOINT automaticamente.
        # Nao precisa modificar o Dockerfile nem o codigo.
        instrumentation.opentelemetry.io/inject-python: "monitoring/python-instrumentation"
    spec:
      containers:
      - name: api
        image: python:3.11-slim
        command: ["sh", "-c", "pip install flask && python /app/app.py"]
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: app
          mountPath: /app
      volumes:
      - name: app
        configMap:
          name: api-pedidos
---
apiVersion: v1
kind: Service
metadata:
  name: api-pedidos
  namespace: otel-test
spec:
  selector:
    app: api-pedidos
  ports:
  - port: 5000
    targetPort: 5000
