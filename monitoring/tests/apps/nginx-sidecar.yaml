# =====================================================================
# Nginx com sidecar OTel - Exemplo de injecao de sidecar
# =====================================================================
# APENAS PARA TESTE - Demonstra a injecao de um collector sidecar.
#
# Diferenca entre sidecar e auto-instrumentation:
# - sidecar: injeta um collector que RECEBE dados OTLP do container
#   principal. A aplicacao PRECISA ter um SDK OTel para enviar dados.
# - auto-instrumentation: injeta um agente que CAPTURA dados
#   automaticamente. A aplicacao nao precisa de SDK.
#
# Annotation:
#   sidecar.opentelemetry.io/inject: "true"
#
# [ATENCAO] O sidecar sozinho NAO gera traces!
# Ele apenas recebe e repassa. Se a aplicacao (Nginx) nao tiver SDK,
# nenhum trace sera gerado. Use auto-instrumentation para isso.
#
# Pre-requisito: OpenTelemetryCollector mode: sidecar no namespace
#   monitoring/modules/monitoring/opentelemetry-operator/manifests/
# =====================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-sidecar
  namespace: otel-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-sidecar
  template:
    metadata:
      labels:
        app: nginx-sidecar
      annotations:
        # Injeta um collector sidecar no pod
        # A aplicacao (Nginx) precisa ter SDK OTel para enviar dados
        sidecar.opentelemetry.io/inject: "true"
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-sidecar
  namespace: otel-test
spec:
  selector:
    app: nginx-sidecar
  ports:
  - port: 80
    targetPort: 80
