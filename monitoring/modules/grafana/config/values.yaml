# Grafana - Configuration System
# =====================================================================
# Grafana e a camada de visualizacao da stack de observabilidade.
# Conecta-se a Prometheus, Loki e Tempo como datasources.
# =====================================================================
replicaCount: ${grafana_replica_count}

adminPassword: admin

resources:
  limits:
    cpu: 500m
    memory: 768Mi
  requests:
    cpu: 200m
    memory: 128Mi

persistence:
  enabled: false

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server:80
        isDefault: true
        jsonData:
          httpMethod: POST
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        jsonData:
          timeout: 60
          maxLines: 1000
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3100
        jsonData:
          traces: true
          search:
            hide: false
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: PBFA97CFB590B2093
      - name: Alertmanager
        type: alertmanager
        access: proxy
        url: http://alertmanager.monitoring.svc.cluster.local:9093
        jsonData:
          handleAlertManagerManually: true
          implementation: prometheus

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

# Sidecar para dashboards (DESATIVADO)
# =====================================================================
# O Helm Chart do Grafana oferece um sidecar (kiwigrid/k8s-sidecar)
# que observa ConfigMaps com label grafana_dashboard=1 e copia
# automaticamente os dashboards para dentro do pod.
#
# Motivo da desativacao:
# 1. O sidecar sobrescreve dashboards importados via API REST,
#    impedindo correcoes pontuais (ex: ajuste de datasource).
# 2. Causa o erro "Cannot save provisioned dashboard" ao tentar
#    atualizar via API, pois ele recria o dashboard original.
# 3. Adiciona complexidade desnecessaria: um container extra,
#    watch de ConfigMaps, e conflitos de versao.
#
# Abordagem atual:
# - Dashboards sao versionados como arquivos JSON em config/
# - Importados via API REST (curl POST /api/dashboards/db)
# - O ConfigMap grafana-dashboards serve como fonte de verdade
#   para reconstrucao, mas a importacao e feita sob demanda
# =====================================================================
sidecar:
  dashboards:
    enabled: false
