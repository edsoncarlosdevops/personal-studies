# Grafana - Configuration System
# =====================================================================
# Grafana e a camada de visualizacao da stack de observabilidade.
# =====================================================================
replicaCount: ${grafana_replica_count}

adminPassword: admin

resources:
  limits:
    cpu: 500m
    memory: 768Mi
  requests:
    cpu: 200m
    memory: 128Mi

persistence:
  enabled: false

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server:80
        isDefault: true
        jsonData:
          httpMethod: POST
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        jsonData:
          timeout: 60
          maxLines: 1000
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3100
        jsonData:
          traces: true
          search:
            hide: false
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: PBFA97CFB590B2093
      - name: Alertmanager
        type: alertmanager
        access: proxy
        url: http://alertmanager.monitoring.svc.cluster.local:9093
        jsonData:
          handleAlertManagerManually: true
          implementation: prometheus

# Sidecar para dashboards
# Copia automaticamente ConfigMaps com label grafana_dashboard=1
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    folder: /tmp/dashboards
    defaultFolderName: null
    resource: configmap
