# Grafana Loki - Configuration System
# =====================================================================
# Loki e um sistema de agregacao de logs. Indexa apenas metadados
# (labels), nao o texto completo, tornando o armazenamento barato.
#
# Modo SingleBinary (sem gateway, sem backend/read/write separados).
# Ideal para ambientes dev/lab.
#
# Fluxo:
#   Pod (stdout) -> /var/log/pods/ -> OTel Collector (filelog) -> Loki (:3100) -> Grafana
#   [ALTERADO] Promtail substituído pelo OTel Collector (filelog + k8sattributes)
#
# [ATENCAO] path_prefix:
# O container do Loki roda como user nao-root (UID 10001).
# /var/loki NAO e writable por este user. Usar /tmp/loki como prefix.
#
# [ATENCAO] PORTAS:
# - 3100: http_listen_port (API de consulta/ingestao - usada pelo Grafana e Promtail)
# - 9095: gRPC interno (comunicacao entre componentes, nao exposto)
#
# [ATENCAO] GATEWAY DESABILITADO:
# Como usamos SingleBinary, o gateway e desnecessario.
# O Promtail envia logs diretamente para loki:3100/loki/api/v1/push.
# =====================================================================
deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1
    path_prefix: /tmp/loki

  storage:
    type: "filesystem"
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  # ===========================================================================
  # LIMITS CONFIG - Controle de taxa de ingestão de logs
  # ===========================================================================
  #
  # 📊 SLI (Service Level Indicator):
  #   ingestion_rate_mb = Quantos MB/s cada tenant pode ingerir
  #   per_stream_rate_limit = Limite por stream (namespace/pod/container)
  #
  # 🎯 SLO (Service Level Objective):
  #   - 50MB/s é suficiente para ~100 pods com logs intensos
  #   - Se bater o limite, logs são rejeitados (HTTP 429)
  #
  # 📋 SLA (Service Level Agreement):
  #   - Se o rate limit for atingido, OTel Collector faz retry
  #   - Se persistir, alerta "SLO - Disponibilidade" dispara
  #   - Solução: aumentar ingestion_rate_mb ou escalar Loki
  #
  # [ATENCAO] Valores padrão do Loki são muito baixos (4MB/s).
  # Para ambiente dev/lab com OTel Collector, 50MB/s é seguro.
  # Para produção, monitorar e ajustar conforme necessário.
  # ===========================================================================
  limits_config:
    volume_enabled: true
    max_cache_freshness_per_query: 10m
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    split_queries_by_interval: 15m
    ingestion_rate_mb: 50
    ingestion_burst_size_mb: 100
    per_stream_rate_limit: 50MB
    per_stream_rate_limit_burst: 100MB

  # Ingestao via OTLP desabilitada (logs vao via filelog do OTel Collector)
  otlp_config:
    logs:
      enabled: false

testing:
  enabled: false

loki-canary:
  enabled: false

  server:
    http_listen_port: 3100
    grpc_listen_port: 9095

singleBinary:
  replicas: 1
  persistence:
    enabled: false

  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
gateway:
  enabled: false
resultsCache:
  enabled: false
chunksCache:
  enabled: false

