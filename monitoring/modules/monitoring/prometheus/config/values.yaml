# Prometheus - Configuration System
# =====================================================================
# Prometheus coleta metricas via scraping HTTP e armazena em TSDB.
#
# [ATENCAO] TARGETS DE SCRAPING
# O chart do Prometheus ja configura varios targets automaticos do
# Kubernetes, incluindo as permissoes RBAC necessarias. Usamos
# extraScrapeConfigs para ADICIONAR targets customizados sem
# substituir os existentes.
#
# Targets fornecidos pelo chart (automaticos):
# 1. prometheus (localhost:9090) - ESSENCIAL: metricas do proprio servico
# 2. kubernetes-apiservers - Metricas do API Server K8s
# 3. kubernetes-nodes - CPU/memoria dos EC2 nodes (via kubelet proxy)
# 4. kubernetes-nodes-cadvisor - CPU/memoria por container/pod
# 5. kubernetes-pods - Pods com annotation prometheus.io/scrape=true
# 6. kubernetes-service-endpoints - Services com annotation
# 7. prometheus-pushgateway - Para push model (desligado)
#
# Targets customizados (via extraScrapeConfigs):
# 8. opentelemetry-collector (:8889) - ESSENCIAL: metricas via SDK OTel
#
# Para desabilitar algum target automatico, use as flags abaixo.

# Desabilita componentes anexos
alertmanager:
  enabled: false
pushgateway:
  enabled: false
nodeExporter:
  enabled: false  # Desligado porque usamos o kubelet proxy (target 3)
kubeStateMetrics:
  enabled: false

server:
  name: server
  global:
    scrape_interval: 15s
    evaluation_interval: 15s
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  persistentVolume:
    enabled: false
  serviceAccount:
    create: true
    name: prometheus-server

# [ATENCAO] extraScrapeConfigs - ADICIONA targets sem substituir os
# existentes. Diferente do serverFiles que sobrescreve TUDO.
extraScrapeConfigs: |
  - job_name: opentelemetry-collector
    scrape_interval: 15s
    static_configs:
      - targets:
        - opentelemetry-collector.monitoring.svc.cluster.local:8889
