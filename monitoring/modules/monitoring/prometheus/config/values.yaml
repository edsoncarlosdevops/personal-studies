# Prometheus - Configuration System
# =====================================================================
# Prometheus coleta metricas via scraping HTTP e armazena em TSDB.
#
# [ATENCAO] ALVOS DE SCRAPING:
# O Prometheus so raspa targets listados em scrape_configs.
# Se o target do OTEL Collector nao estiver configurado, as metricas
# enviadas via SDK OTel nunca aparecem nas queries.
#
# Scrape configs definidos:
# - prometheus (localhost:9090): metricas do proprio Prometheus
# - opentelemetry-collector (:8889): endpoint de export do Collector

# Desabilita componentes que nao vamos usar no lab
alertmanager:
  enabled: false
pushgateway:
  enabled: false
nodeExporter:
  enabled: false
kubeStateMetrics:
  enabled: false

server:
  name: server

  global:
    scrape_interval: 15s
    evaluation_interval: 15s

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

  persistentVolume:
    enabled: false

  serviceAccount:
    create: true
    name: prometheus-server

# [ATENCAO] extraScrapeConfigs - Obrigatorio para raspar o OTEL Collector
# Sem isso, metricas como http_requests_total nunca aparecem no Prometheus
# O target aponta para o service do Collector na porta 8889 (prometheus-export)
extraScrapeConfigs: |
  - job_name: opentelemetry-collector
    scrape_interval: 15s
    static_configs:
      - targets:
        - opentelemetry-collector.monitoring.svc.cluster.local:8889
