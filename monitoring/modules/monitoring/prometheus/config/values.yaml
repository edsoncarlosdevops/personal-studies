# Prometheus - Configuration System
# =====================================================================
# Prometheus coleta metricas via scraping HTTP e armazena em TSDB.
#
# Targets configurados (apenas os essenciais para t3.medium):
# - prometheus (localhost:9090): metricas do proprio Prometheus
# - opentelemetry-collector (:8889): endpoint de export do Collector
# - kubernetes-nodes: CPU/memoria dos EC2 (util para lab)
# - kubernetes-nodes-cadvisor: CPU/memoria por container (util para lab)
#
# Targets desabilitados para economizar recursos:
# - kubernetes-apiservers: metricas do API Server (relevante em producao)
# - kubernetes-pods: so rasga se tiver annotation (nao temos)
# - kubernetes-service-endpoints: so rasga se tiver annotation
# - prometheus-pushgateway: nao usamos pushgateway
# - kubernetes-ingress: nao temos ingresses com metricas

# Desabilita componentes anexos
alertmanager:
  enabled: false
pushgateway:
  enabled: false
nodeExporter:
  enabled: true
kubeStateMetrics:
  enabled: false

server:
  name: server

  global:
    scrape_interval: 15s
    evaluation_interval: 15s

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

  persistentVolume:
    enabled: false

  serviceAccount:
    create: true
    name: prometheus-server

  # [ATENCAO] Desabilitar scrapers automaticos do Kubernetes
  # O chart do Prometheus ativa varios jobs de descoberta automatica.
  # Para t3.medium, manter apenas nodes e cadvisor (uteis para lab).
  # 
  # Valores possiveis: true = habilita, false = desabilita
  enableServiceLinks: false
  
  # Descoberta automatica de alvos
  automountServiceAccountToken: true

  # Jobs de scraping automatico do Kubernetes
  # kubernetes_apiservers: false desabilita scraping do API Server
  # kubernetes_nodes: true mantem metricas dos nodes
  # kubernetes_service_endpoints: false (nao temos services com metricas)
  # kubernetes_pods: false (nao temos pods com annotations)
  
# Configuracoes adicionais via raw YAML
# Os scraps do Kubernetes sao controlados por configs internas do chart
# que nao sao expostas via values. Vamos usar serverFiles para sobrescrever.
serverFiles:
  prometheus.yml:
    scrape_configs:
      # Apenas Prometheus e OTEL Collector
      - job_name: prometheus
        static_configs:
          - targets:
            - localhost:9090
      
      - job_name: opentelemetry-collector
        scrape_interval: 15s
        static_configs:
          - targets:
            - opentelemetry-collector.monitoring.svc.cluster.local:8889
