# Prometheus - Configuration System
# =====================================================================
# Prometheus coleta metricas via scraping HTTP e armazena em TSDB.
#
# Targets ativos (apenas os essenciais):
# 1. prometheus (localhost:9090) - metricas do proprio servico
# 2. opentelemetry-collector (:8889) - metricas via SDK OTel
# 3. kubernetes-nodes (node-exporter :9100) - CPU/memoria dos EC2

alertmanager:
  enabled: false
pushgateway:
  enabled: false

prometheus-node-exporter:
  enabled: true

kubeStateMetrics:
  enabled: false

server:
  name: server
  global:
    scrape_interval: 15s
    evaluation_interval: 15s
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  persistentVolume:
    enabled: false
  serviceAccount:
    create: true
    name: prometheus-server

# [ATENCAO] serverFiles sobrescreve TODA a config do Prometheus.
serverFiles:
  prometheus.yml:
    scrape_configs:
      # --- TARGET 1: Proprio Prometheus ---
      - job_name: prometheus
        static_configs:
          - targets:
            - localhost:9090

      # --- TARGET 2: OTEL Collector (metricas da app) ---
      - job_name: opentelemetry-collector
        scrape_interval: 15s
        static_configs:
          - targets:
            - opentelemetry-collector.monitoring.svc.cluster.local:8889

      # --- TARGET 3: Nodes via node-exporter ---
      # 3 nodes EC2 t3.medium, cada um com node-exporter na porta 9100
      - job_name: kubernetes-nodes
        scrape_interval: 15s
        scheme: http
        static_configs:
          - targets:
            - prometheus-prometheus-node-exporter.monitoring.svc.cluster.local:9100
