# Prometheus - Values para Helm Chart
# =====================================================================
# Prometheus e o sistema padrao de monitoramento e alerta do ecossistema
# CNCF. Coleta metricas via scraping HTTP e armazena em formato TSDB.

# Desabilita componentes que nao vamos usar no lab
alertmanager:
  enabled: false # Ja temos um Alertmanager separado

# Configuracao do servidor Prometheus
server:
  name: server
  # Configuracoes globais de scraping
  global:
    scrape_interval: 15s
    evaluation_interval: 15s

  # Recursos do servidor
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

  # Persistencia opcional (desabilitada para lab)
  persistentVolume:
    enabled: false

  # Service account com permissoes para scrap de metricas do K8s
  serviceAccount:
    create: true
    name: prometheus-server
