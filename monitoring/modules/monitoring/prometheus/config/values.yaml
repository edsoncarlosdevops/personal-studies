# Prometheus - Configuration System
# =====================================================================
# Prometheus coleta metricas via scraping HTTP e armazena em TSDB.
#
# Targets de scrape configurados:
# 1. prometheus (localhost:9090) - metricas do proprio servico
# 2. opentelemetry-collector (:8889) - metricas da aplicacao via SDK OTel
# 3. kubernetes-nodes (node-exporter :9100) - metricas de CPU/memoria dos EC2
# 4. kube-state-metrics (:8080) - metricas de objetos Kubernetes (pods, deployments)
# =====================================================================

alertmanager:
  enabled: false
pushgateway:
  enabled: false

prometheus-node-exporter:
  enabled: true

kubeStateMetrics:
  enabled: true

server:
  name: server
  global:
    scrape_interval: 15s
    evaluation_interval: 15s
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  persistentVolume:
    enabled: false
  serviceAccount:
    create: true
    name: prometheus-server

# [ATENCAO] serverFiles sobrescreve TODA a config do Prometheus.
# Nao usar alertmanager.rules ou outros blocos aqui, senao o padrao e perdido.
serverFiles:
  prometheus.yml:
    scrape_configs:
      # --- TARGET 1: Proprio Prometheus ---
      - job_name: prometheus
        static_configs:
          - targets:
            - localhost:9090

      # --- TARGET 2: OTEL Collector (metricas da app via exporter prometheus) ---
      - job_name: opentelemetry-collector
        scrape_interval: 15s
        static_configs:
          - targets:
            - opentelemetry-collector.monitoring.svc.cluster.local:8889

      # --- TARGET 3: Nodes via node-exporter ---
      # 3 nodes EC2 t3.medium, cada um com node-exporter na porta 9100
      - job_name: kubernetes-nodes
        scrape_interval: 15s
        scheme: http
        static_configs:
          - targets:
            - prometheus-prometheus-node-exporter.monitoring.svc.cluster.local:9100

      # --- TARGET 4: kube-state-metrics (metricas de pods, deployments, etc) ---
      - job_name: kube-state-metrics
        scrape_interval: 15s
        static_configs:
          - targets:
            - prometheus-kube-state-metrics.monitoring:8080

      # --- TARGET 5: Kubelet / cadvisor (metricas de container: CPU, memoria, disco) ---
      # Necessario para metricas container_cpu_usage_seconds_total,
      # container_memory_working_set_bytes, etc.
      # O kubelet expoe essas metricas em /metrics/cadvisor na porta 10250
      # Usa service discovery do Kubernetes para encontrar todos os nodes
      - job_name: kubernetes-cadvisor
        scrape_interval: 15s
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - action: replace
            replacement: kubernetes.default.svc:443
            target_label: __address__
          - action: replace
            source_labels:
              - __meta_kubernetes_node_name
            regex: (.+)
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
            target_label: __metrics_path__
          - action: replace
            source_labels: [__meta_kubernetes_node_name]
            target_label: node

