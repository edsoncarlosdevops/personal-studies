# ═══════════════════════════════════════════════════════════
# Prometheus - Values para Helm Chart
# ═══════════════════════════════════════════════════════════
#
# ATENÇÃO: StorageClass no EKS
# - O EKS usa "gp2" como storageClass padrão (não "standard")
# - O storageClass gp2 tem volumeBindingMode: WaitForFirstConsumer
#   Isso significa que o PV só é criado quando um Pod realmente
#   utiliza o PVC, o que pode causar delays no scheduling
# - Para labs, é mais prático desabilitar persistência

# Desabilitando componentes extras para economizar recursos no EKS
alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false

prometheus-node-exporter:
  enabled: false

kube-state-metrics:
  enabled: false

server:
  retention: "5d"
  replicaCount: ${prometheus_replica_count}
  persistentVolume:
    enabled: false # Desabilitado para lab (EKS t3.medium), sem necessidade de persistência
  
  # Recursos ajustados para EKS (t3.medium - 2 vCPU, 4GB RAM)
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

serverFiles:
  prometheus.yml:
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
            - localhost:9090