# Prometheus - Configuration System
# =====================================================================
# Prometheus coleta metricas via scraping HTTP e armazena em TSDB.
#
# [ATENCAO] TARGETS DE SCRAPING
# Abaixo a lista de todos os targets possiveis com importancia e custo.
# Mantemos apenas os essenciais para nao sobrecarregar o t3.medium.
#
# TARGETS ATIVOS:
# 1. prometheus (localhost:9090) - ESSENCIAL: metricas do proprio servico
# 2. opentelemetry-collector (:8889) - ESSENCIAL: metricas via SDK OTel
#
# TARGETS OPCIONAIS (comente se quiser ativar):
# 3. kubernetes-nodes (:10250) - RECOMENDADO: CPU/memoria dos EC2 nodes
#    Ex: node_cpu_seconds_total, node_memory_MemFree_bytes
#    Custo: +3 targets (um por node). Consome ~10% mais recursos.
# 4. kubernetes-nodes-cadvisor (:10250/cadvisor) - RECOMENDADO:
#    Metricas de containers individuais (CPU/memoria por pod)
#    Ex: container_cpu_usage_seconds_total, container_memory_working_set_bytes
#    Custo: +3 targets. Consome ~15% mais recursos.
# 5. kubernetes-apiservers (:443) - BAIXA: So relevante se estiver
#    debugando o API Server do K8s. Ex: apiserver_request_duration_seconds
#    Custo: +2 targets. Consome ~5% mais recursos.
# 6. kubernetes-pods (annotation) - BAIXA: So rasga se o pod tiver
#    a annotation 'prometheus.io/scrape=true'. Nenhum pod nosso tem.
#    Custo: 0 (so existe quando um pod pede).
# 7. kubernetes-service-endpoints (annotation) - BAIXA: Mesma logica
#    dos pods, mas para services. Nenhum service nosso tem.
#    Custo: 0 (so existe quando um service pede).
# 8. prometheus-pushgateway (:9091) - NENHUMA: Para metricas push.
#    Nao usamos push model, apenas pull. Manter desligado.
# 9. kubernetes-ingress (:10254) - BAIXA: Para ingresses com NGINX.
#    Nao temos ingress configurado. Custo: 0.
#
# RECOMENDACAO: Em lab, manter apenas 1+2. Se quiser monitorar
# recursos do cluster, ativar 3 e 4. O restante so em producao.

# Desabilita componentes anexos
alertmanager:
  enabled: false
pushgateway:
  enabled: false
nodeExporter:
  enabled: false  # [ATENCAO] nodeExporter desligado porque usamos
                  # o proxy do Kubernetes para acessar metricas dos nodes
kubeStateMetrics:
  enabled: false

server:
  name: server

  global:
    scrape_interval: 15s
    evaluation_interval: 15s

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

  persistentVolume:
    enabled: false

  serviceAccount:
    create: true
    name: prometheus-server

# [ATENCAO] Configuracao de scraping via serverFiles
# O serverFiles sobrescreve a configuracao padrao do Prometheus.
# Aqui definimos manualmente apenas os targets que queremos.
#
# Para ATIVAR targets de Kubernetes (nodes, cadvisor, apiservers, etc),
# descomente os blocos abaixo.
serverFiles:
  prometheus.yml:
    scrape_configs:
      # --- TARGET 1: Prometheus (ESSENCIAL) ---
      - job_name: prometheus
        static_configs:
          - targets:
            - localhost:9090

      # --- TARGET 2: OTEL Collector (ESSENCIAL) ---
      - job_name: opentelemetry-collector
        scrape_interval: 15s
        static_configs:
          - targets:
            - opentelemetry-collector.monitoring.svc.cluster.local:8889

      # --- TARGET 3: Nodes do Kubernetes (OPCIONAL) ---
      # Descomente para monitorar CPU/memoria dos EC2 nodes
      # Ex de metricas: node_cpu_seconds_total, node_memory_MemFree_bytes
      # - job_name: kubernetes-nodes
