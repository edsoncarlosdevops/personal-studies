# Prometheus - Configuration System
# =====================================================================
# Prometheus coleta metricas via scraping HTTP e armazena em TSDB.
#
# [ATENCAO] TARGETS DE SCRAPING
# Usamos extraScrapeConfigs para ADICIONAR targets customizados sem
# substituir os targets que o chart ja configura (API Server, nodes,
# node-exporter, etc).
#
# TARGETS FORNECIDOS PELO CHART:
# 1. prometheus (localhost:9090) - ESSENCIAL
# 2. kubernetes-apiservers - API Server K8s
# 3. kubernetes-nodes/node-exporter - Nodes via node-exporter (:9100)
#    [ATENCAO] O chart cria automaticamente o target do node-exporter
#    quando o subchart prometheus-node-exporter: enabled: true
#
# TARGETS CUSTOMIZADOS (extraScrapeConfigs):
# 4. opentelemetry-collector (:8889) - ESSENCIAL

alertmanager:
  enabled: false
pushgateway:
  enabled: false

# [ATENCAO] Habilita node-exporter como DaemonSet
# Instala um pod em cada node expondo metricas do SO na porta 9100.
# O chart do Prometheus cria automaticamente o scrape config.
prometheus-node-exporter:
  enabled: true

kubeStateMetrics:
  enabled: false

server:
  name: server
  global:
    scrape_interval: 15s
    evaluation_interval: 15s
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  persistentVolume:
    enabled: false
  serviceAccount:
    create: true
    name: prometheus-server

# [ATENCAO] extraScrapeConfigs ADICIONA targets sem substituir os
# existentes. Use isso para targets customizados como o OTEL Collector.
extraScrapeConfigs: |
  - job_name: opentelemetry-collector
    scrape_interval: 15s
    static_configs:
      - targets:
        - opentelemetry-collector.monitoring.svc.cluster.local:8889
