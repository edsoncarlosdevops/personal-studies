# Grafana - Configuration System
# =====================================================================
# Grafana e a camada de visualizacao da stack de observabilidade.
# Conecta-se a Prometheus, Loki e Tempo como datasources.
#
# [ATENCAO] PORTAS DOS DATASOURCES:
# Cada servico expoe portas DIFERENTES para ingestao vs consulta.
# Configurar a porta errada = Bad Gateway ou 404 no Grafana.
#
# Portas de CONSULTA (usadas pelo Grafana):
# - Prometheus: porta 80 (service mapeia 9090 -> 80)
# - Loki: 3100 (http_listen_port)
# - Tempo: 3100 (http_listen_port)
#   NAO usar 4317 (OTLP gRPC - ingestao) nem 3200 (nao existe)
# =====================================================================
replicaCount: ${grafana_replica_count}

# Senha fixa para ambiente dev/lab
adminPassword: admin

resources:
  limits:
    cpu: 500m
    memory: 768Mi
  requests:
    cpu: 200m
    memory: 128Mi

persistence:
  enabled: false
  storageClass: oci
  accessMode: ReadWriteOnce
  size: 10Gi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server:80
        isDefault: true
        jsonData:
          httpMethod: POST

      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        jsonData:
          timeout: 60
          maxLines: 1000

      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3100
        jsonData:
          traces: true
          search:
            hide: false
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: PBFA97CFB590B2093

      - name: Alertmanager
        type: alertmanager
        access: proxy
        url: http://alertmanager.monitoring.svc.cluster.local:9093
        jsonData:
          handleAlertManagerManually: true
          implementation: prometheus

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: "Stack de Observabilidade"
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

dashboards:
  observabilidade-stack.json:
    json: |
      {
          "dashboard": {
              "title": "Stack de Observabilidade",
              "tags": [
                  "observabilidade",
                  "otel",
                  "eks"
              ],
              "timezone": "browser",
              "refresh": "30s",
              "schemaVersion": 39,
              "panels": [
                  {
                      "id": 1,
                      "title": "CPU dos Containers (top 5)",
                      "type": "timeseries",
                      "datasource": {
                          "type": "prometheus",
                          "uid": "PBFA97CFB590B2093"
                      },
                      "gridPos": {
                          "h": 8,
                          "w": 12,
                          "x": 0,
                          "y": 0
                      },
                      "targets": [
                          {
                              "expr": "topk(5, sum(rate(container_cpu_usage_seconds_total{namespace!=\"\"}[5m])) by (container, namespace))",
                              "legendFormat": "{{namespace}}/{{container}}"
                          }
                      ]
                  },
                  {
                      "id": 2,
                      "title": "Memory dos Containers (top 5)",
                      "type": "timeseries",
                      "datasource": {
                          "type": "prometheus",
                          "uid": "PBFA97CFB590B2093"
                      },
                      "gridPos": {
                          "h": 8,
                          "w": 12,
                          "x": 12,
                          "y": 0
                      },
                      "targets": [
                          {
                              "expr": "topk(5, sum(container_memory_working_set_bytes{namespace!=\"\"}) by (container, namespace))",
                              "legendFormat": "{{namespace}}/{{container}}"
                          }
                      ],
                      "fieldConfig": {
                          "defaults": {
                              "unit": "bytes"
                          }
                      }
                  },
                  {
                      "id": 3,
                      "title": "Pods por Namespace",
                      "type": "stat",
                      "datasource": {
                          "type": "prometheus",
                          "uid": "PBFA97CFB590B2093"
                      },
                      "gridPos": {
                          "h": 4,
                          "w": 8,
                          "x": 0,
                          "y": 8
                      },
                      "targets": [
                          {
                              "expr": "count(kube_pod_status_phase{phase=\"Running\"}) by (namespace)",
                              "legendFormat": "{{namespace}}"
                          }
                      ]
                  },
                  {
                      "id": 4,
                      "title": "Nodes - CPU (%)",
                      "type": "timeseries",
                      "datasource": {
                          "type": "prometheus",
                          "uid": "PBFA97CFB590B2093"
                      },
                      "gridPos": {
                          "h": 8,
                          "w": 8,
                          "x": 8,
                          "y": 8
                      },
                      "targets": [
                          {
                              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[1m])) by (instance) * 100)",
                              "legendFormat": "{{instance}}"
                          }
                      ]
                  },
                  {
                      "id": 5,
                      "title": "Nodes - Memory (%)",
                      "type": "timeseries",
                      "datasource": {
                          "type": "prometheus",
                          "uid": "PBFA97CFB590B2093"
                      },
                      "gridPos": {
                          "h": 8,
                          "w": 8,
                          "x": 16,
                          "y": 8
                      },
                      "targets": [
                          {
                              "expr": "(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100",
                              "legendFormat": "{{instance}}"
                          }
                      ]
                  },
                  {
                      "id": 6,
                      "title": "Traces - api-pedidos",
                      "type": "table",
                      "datasource": {
                          "type": "tempo",
                          "uid": "P214B5B846CF3925F"
                      },
                      "gridPos": {
                          "h": 8,
                          "w": 12,
                          "x": 0,
                          "y": 16
                      },
                      "targets": [
                          {
                              "query": "{\"rootServiceName\"=\"api-pedidos\"}",
                              "limit": 20
                          }
                      ],
                      "fieldConfig": {
                          "defaults": {
                              "custom": {
                                  "align": "left"
                              }
                          },
                          "overrides": [
                              {
                                  "matcher": {
                                      "id": "byName",
                                      "options": "traceID"
                                  },
                                  "properties": [
                                      {
                                          "id": "links",
                                          "value": [
                                              {
                                                  "title": "Ver detalhes",
                                                  "url": "",
                                                  "internal": {
                                                      "queryType": "traceId",
                                                      "datasourceUid": "P214B5B846CF3925F",
                                                      "datasourceName": "Tempo"
                                                  }
                                              }
                                          ]
                                      }
                                  ]
                              }
                          ]
                      }
                  },
                  {
                      "id": 7,
                      "title": "Logs (Loki)",
                      "type": "logs",
                      "datasource": {
                          "type": "loki",
                          "uid": "P8E80F9AEF21F6940"
                      },
                      "gridPos": {
                          "h": 8,
                          "w": 12,
                          "x": 12,
                          "y": 16
                      },
                      "targets": [
                          {
                              "expr": "{stream=~\".+\"}",
                              "limit": 50
                          }
                      ]
                  },
                  {
                      "id": 8,
                      "title": "Uptime dos Pods",
                      "type": "table",
                      "datasource": {
                          "type": "prometheus",
                          "uid": "PBFA97CFB590B2093"
                      },
                      "gridPos": {
                          "h": 8,
                          "w": 24,
                          "x": 0,
                          "y": 24
                      },
                      "targets": [
                          {
                              "expr": "time() - kube_pod_start_time",
                              "legendFormat": "{{pod}}",
                              "format": "table",
                              "instant": true
                          }
                      ],
                      "fieldConfig": {
                          "defaults": {
                              "unit": "s",
                              "custom": {
                                  "align": "left"
                              }
                          }
                      }
                  }
              ]
          },
          "overwrite": true
      }
