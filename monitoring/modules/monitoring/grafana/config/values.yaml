# Grafana Helm Chart Configuration
# =====================================================================
# [ATENCAO] ATENÇÃO: Portas dos Datasources
# Cada servico expoe portas especificas para diferentes propositos
# (ingestao vs consulta). Configurar a porta errada causa
# "Bad Gateway" ou "Connection Refused" no Grafana.
# =====================================================================
replicaCount: ${grafana_replica_count}

resources:
  limits:
    cpu: 500m
    memory: 768Mi
  requests:
    cpu: 200m
    memory: 128Mi

persistence:
  enabled: false  # Disabled to allow multiple replicas
  storageClass: oci
  accessMode: ReadWriteOnce
  size: 10Gi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        # Porta 80 = service do Prometheus Server (container expoe 9090, service mapeia pra 80)
        url: http://prometheus-server:80
        isDefault: true
        jsonData:
          httpMethod: POST

      - name: Loki
        type: loki
        access: proxy
        # Porta 3100 = http_listen_port padrao do Loki para queries HTTP (API de logs)
        # Nao confundir com porta 9095 (gRPC interno) ou 9096 (HTTP interno)
        url: http://loki:3100
        jsonData:
          timeout: 60
          maxLines: 1000

      - name: Tempo
        type: tempo
        access: proxy
        # [ATENCAO] PORTAS CRITICAS DO TEMPO:
        # - 3100: http_listen_port (API de consulta de traces - usada pelo Grafana)
        # - 4317: OTLP gRPC (ingestao de traces, nao para consultas)
        # - 4318: OTLP HTTP (ingestao de traces, nao para consultas)
        # - 3200: NAO EXISTE (causa Bad Gateway se configurado)
        url: http://tempo:3100
        jsonData:
          traces: true
