# ═══════════════════════════════════════════════════════════
# Tempo - Values para Helm Chart
# (antigo grafana_tempo, renomeado para consistência)
# ═══════════════════════════════════════════════════════════
#
# ATENÇÃO: StorageClass no EKS
# - StorageClass "gp2" com volumeBindingMode: WaitForFirstConsumer
# - Se habilitar persistência, usar storageClass: "gp2"
# - Para lab, manter persistence.enabled: false
#
# ATENÇÃO: Backend local vs S3
# - Em modo single binary, usar backend: "local" (sem S3)
# - Para produção, configurar S3/GCS como backend

replicas: 1

tempo:
  repository: grafana/tempo
  tag: 2.3.1
  
  # Configuração para rodar sem S3 (modo local)
  storage:
    trace:
      backend: local 
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  # Recursos para EKS (t3.medium)
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

persistence:
  enabled: false # Desabilitado para lab. Se habilitar, usar storageClass: "gp2"

