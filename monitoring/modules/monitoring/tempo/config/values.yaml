# Grafana Tempo - Configuration System (Production Ready)
# =====================================================================
# Tempo e um banco de dados de tracing distribuido de alta escala.
# Ele aceita dados via OTLP, Jaeger, Zipkin e OpenCensus.
#
# [ATENCAO] StorageClass no EKS
# - No EKS, a StorageClass padrao e "gp2" com WaitForFirstConsumer
# - Para lab, persistence pode ficar false
# - Em producao, usar backend S3 e nao disco local
#
# [ATENCAO] Backend local vs S3
# - Backend "local" e apenas para lab/sandbox
# - Em producao, configurar backend S3/GCS para dados de tracing
# - Tracing costuma gerar muitos dados (GB/dia facilmente)
#
# Portas do Tempo:
# - 3100: http_listen_port (API de consulta de traces - usada pelo Grafana)
# - 4317: OTLP gRPC (ingestao de traces)
# - 4318: OTLP HTTP (ingestao de traces)
# - 3200: NAO EXISTE (nao confundir!)
# - 6831/6832: Jaeger Thrift Compact/Binary
# - 9411: Zipkin

# Modo de deploy: monolithic (single binary), scalable (microservices), ou serverless
mode: monolithic

tempo:
  # Configuracao unificada do Tempo em YAML
  yaml:
    # Desabilita multi-tenencia para lab
    multitenancy_enabled: false

    # Configura receivers padrao
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    # Armazenamento local (apenas para lab!)
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    # Servidor HTTP - porta para consultas do Grafana
    server:
      http_listen_port: 3100

    # Retencao de dados (24h para lab)
    compactor:
      compaction:
        block_retention: 24h

# Persistencia para o volume de traces
persistence:
  enabled: false # Lab. Em producao, usar S3

# Recursos do pod
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
