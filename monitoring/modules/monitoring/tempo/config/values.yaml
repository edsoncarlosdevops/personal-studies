# Grafana Tempo - Configuration System
# =====================================================================
# Tempo e um banco de dados de tracing distribuido.
#
# [ATENCAO] PORTAS CRITICAS:
# - 3100: http_listen_port (API de consulta de traces - USADA PELO GRAFANA)
# - 4317: OTLP gRPC (ingestao de traces - USADA PELO OTEL COLLECTOR)
# - 4318: OTLP HTTP (ingestao de traces alternativa)
# - 3200: NAO EXISTE (causa Bad Gateway se configurado no Grafana)
#
# [ATENCAO] FLUXO:
# App (OTel SDK) -> OTEL Collector (:4317) -> Tempo (:4317)
# Grafana -> Tempo (:3100) para consultar traces

mode: monolithic

tempo:
  yaml:
    multitenancy_enabled: false

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    server:
      http_listen_port: 3100

    compactor:
      compaction:
        block_retention: 24h

persistence:
  enabled: false

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
