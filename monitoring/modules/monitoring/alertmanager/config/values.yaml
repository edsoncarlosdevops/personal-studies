# Alertmanager - Values para Helm Chart
# =====================================================================
# O Alertmanager gerencia alertas enviados pelo Prometheus.
# Ele faz deduplicacao, grouping, silenciamento e roteamento.
#
# Nota: Em ambientes dev/lab, o Alertmanager e util para testar
# regras de alerta, mas pode ser desabilitado se desnecessario.
# =====================================================================

replicaCount: 1

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 32Mi

persistence:
  enabled: false


# --- Alertmanager Configuration ---
# Routes alerts received from Prometheus to email notifications.
# Email uses Gmail SMTP with app-specific password.
# For production: update auth_password with a valid Gmail app password.
# See: https://myaccount.google.com/apppasswords
config:
  global:
    resolve_timeout: 5m
  route:
    group_by: ['alertname', 'severity']
    group_wait: 10s
    group_interval: 30s
    repeat_interval: 1h
    receiver: 'email-notifications'
  receivers:
  - name: 'email-notifications'
    email_configs:
    - to: 'edsoncarlos.ec40@gmail.com'
      from: 'edsoncarlos.ec40@gmail.com'
      smarthost: 'smtp.gmail.com:587'
      auth_username: 'edsoncarlos.ec40@gmail.com'
      auth_password: '<SUA_SENHA_DE_APP_GMAIL>'
      require_tls: true
      send_resolved: true
      headers:
        subject: '{{ if eq .Status "firing" }}[CRITICAL]{{ else }}[RESOLVED]{{ end }} {{ .GroupLabels.alertname }}'
      text: |
        {{ if eq .Status "firing" }}[ALERTA CRITICO]{{ else }}[ALERTA RESOLVIDO]{{ end }}
        ============================================
        Alerta: {{ .GroupLabels.alertname }}
        Severidade: {{ .CommonLabels.severity }}
        Status: {{ .Status }}
        Descricao: {{ .CommonAnnotations.description }}
        Inicio: {{ .StartsAt.Format "02/01/2006 15:04:05" }}
        ============================================
        Cluster: aks-observability (Azure)
        Namespace: monitoring
