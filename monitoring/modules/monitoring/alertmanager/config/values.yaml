# Alertmanager - Values para Helm Chart
# =====================================================================
# O Alertmanager gerencia alertas enviados pelo Prometheus.
# Ele faz deduplicacao, grouping, silenciamento e roteamento.
#
# Nota: Em ambientes dev/lab, o Alertmanager e util para testar
# regras de alerta, mas pode ser desabilitado se desnecessario.
# =====================================================================

replicaCount: 1

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 32Mi

persistence:
  enabled: false

