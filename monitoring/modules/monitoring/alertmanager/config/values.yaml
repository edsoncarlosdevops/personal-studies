# Alertmanager - Values para Helm Chart
# =====================================================================
# O Alertmanager gerencia alertas enviados pelo Prometheus.
# Ele faz deduplicacao, grouping, silenciamento e roteamento.
replicaCount: 1

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 32Mi

persistence:
  enabled: false # Para lab local, persistencia no alertmanager raramente e critica
