# Promtail - Coleta de logs do Kubernetes para o Loki
# =============================================================================
# [CORRIGIDO] Problema #1 RESOLVIDO:
# Antes usava config.lokiAddress (que nao era mapeado pelo chart),
# agora usa clients[0].url diretamente.
#
# PROBLEMAS AINDA PENDENTES DE VERIFICACAO:
#
# 1. PERMISSOES RBAC
#    Promtail pode estar sem permissao pra ler /var/log/pods.
#    O chart cria ServiceAccount e ClusterRole, mas verificar se o
#    ClusterRole tem permissao pra listar pods (kubernetes_sd_configs).
#
# 2. VOLUME /var/log/pods
#    Confirmar se o volume hostPath /var/log/pods esta montado.
#    kubectl exec -n monitoring promtail-XXXX -- ls /var/log/pods/
#    Se vazio, o volume nao esta montado.
#
# 3. DASHBOARD GRAFANA DESATUALIZADO
#    O dashboard atual tem UID 4999d044-a288-4297-8f72-c726b1e58b5a
#    e usa queries antigas. Criar um novo dashboard com:
#    - Loki queries: {namespace=~"otel-test|monitoring"}
#    - Prometheus: kube_pod_container_resource_requests
#    - Tempo: queryType = search (padrao, sem filtro)
#
# Fluxo esperado:
#   Pod (stdout) -> /var/log/pods/ -> Promtail -> Loki (:3100)
#
# Labels que devem aparecer no Loki:
#   namespace, pod, container
# =============================================================================

# ═══════════════════════════════════════════════════════
# [CORRIGIDO] Usar clients em vez de config.lokiAddress
# O chart do Promtail v6.x nao mapeia lokiAddress para
# clients[0].url. O default (loki-gateway) nao existe
# no nosso setup (Loki SingleBinary sem gateway).
# O endpoint ${promtail_loki_endpoint} vem do template via terragrunt.hcl
# ═══════════════════════════════════════════════════════
clients:
  - url: ${promtail_loki_endpoint}

config:
  # [CORRIGIDO] logPath explicito para containerd (EKS)
  # No EKS, o runtime e containerd, nao Docker.
  # Os logs dos pods estao em /var/log/pods/, nao em /var/lib/docker/containers
  logPath: /var/log/pods
  snippets:
    scrapeConfigs: |
      - job_name: kubernetes-pods
        pipeline_stages:
          - cri: {}
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container

serviceAccount:
  create: true
  name: promtail

rbac:
  create: true
  pspEnabled: false

# [CORRIGIDO] Volumes para EKS com containerd
# O chart do Promtail v6.x monta /var/lib/docker/containers por padrao,
# que nao existe no EKS (usa containerd). Precisamos montar /var/log/pods.
volumes:
  - name: logs
    hostPath:
      path: /var/log/pods

volumeMounts:
  - name: logs
    mountPath: /var/log/pods
    readOnly: true

