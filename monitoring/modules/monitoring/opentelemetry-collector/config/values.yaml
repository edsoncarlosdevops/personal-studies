replicaCount: ${otel_collector_replica_count}
mode: daemonset
image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.112.0
config:
  exporters:
    debug: {}
    otlp:
      endpoint: tempo.monitoring.svc.cluster.local:4317
      sending_queue:
        enabled: true
        num_consumers: 4
        queue_size: 1000
      tls:
        insecure: true
    prometheus:
      endpoint: 0.0.0.0:8889
      resource_to_telemetry_conversion:
        enabled: true
    loki:
      endpoint: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
      tls:
        insecure: true
  extensions:
    health_check:
      endpoint: ${env:MY_POD_IP}:13133
  processors:
    batch:
      send_batch_size: 1024
      timeout: 5s
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    k8sattributes:
      auth_type: serviceAccount
      extract:
        metadata:
        - k8s.namespace.name
        - k8s.pod.name
        - k8s.container.name
        - k8s.node.name
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    prometheus:
      config:
        scrape_configs:
        - job_name: opentelemetry-collector
          scrape_interval: 10s
          static_configs:
          - targets:
            - ${env:MY_POD_IP}:8888
    filelog:
      include:
      - /var/log/pods/*/*/*.log
      include_file_name: false
      include_file_path: true
      start_at: beginning
      operators:
      - type: move
        from: attributes.message
        to: body
      - type: add
        field: attributes.source
        value: kubernetes
  service:
    extensions:
    - health_check
    pipelines:
      traces:
        exporters:
        - otlp
        processors:
        - memory_limiter
        - batch
        receivers:
        - otlp
      metrics:
        exporters:
        - prometheus
        processors:
        - batch
        receivers:
        - otlp
      logs:
        exporters:
        - debug
        - loki
        processors:
        - k8sattributes
        - memory_limiter
        - batch
        receivers:
        - filelog
    telemetry:
      logs:
        level: info
      metrics:
        address: 0.0.0.0:8888
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
