# OpenTelemetry Collector - Configuration System
# =====================================================================
# O Collector recebe, processa e exporta dados de telemetria
# (Traces, Metrics, Logs). Modo deployment (centralizado).
#
# [ATENCAO] PORTAS - Servico precisa expor estas portas no values.yaml
# para o Prometheus conseguir raspar as metricas:
# - 4317: OTLP gRPC (ingestao de traces/metricas/logs)
# - 4318: OTLP HTTP (ingestao alternativa via HTTP)
# - 8888: Telemetria do proprio Collector (metricas internas)
# - 8889: Endpoint Prometheus (exporter para o Prometheus raspar)
# Sem essas portas no bloco "service.ports", o Prometheus nao consegue
# acessar e o target fica "down".
#
# [ATENCAO] FLUXO DE DADOS:
# App (OTel SDK) -> Collector (:4317 gRPC) -> Tempo (:4317) [traces]
# App (OTel SDK) -> Collector (:4317 gRPC) -> Prometheus (:8889) [metricas]
# Prometheus raspa Collector em :8889/metrics

replicaCount: ${otel_collector_replica_count}

mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.112.0

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1024

  exporters:
    # Exporta traces para o Tempo (porta 4317 = OTLP gRPC)
    # [ATENCAO] Tempo usa 4317 para INGESTAO, 3100 para CONSULTA (Grafana)
    otlp:
      endpoint: "tempo.monitoring.svc.cluster.local:4317"
      tls:
        insecure: true
      sending_queue:
        enabled: true
        num_consumers: 4
        queue_size: 1000

    # Exporta metricas em formato Prometheus (raspado pelo Prometheus)
    # [ATENCAO] Esta porta (8889) precisa estar no "service.ports" abaixo
    prometheus:
      endpoint: "0.0.0.0:8889"
      resource_to_telemetry_conversion:
        enabled: true

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp]
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [prometheus]

    telemetry:
      logs:
        level: "info"
      metrics:
        address: "0.0.0.0:8888"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# [ATENCAO] Portas do Service - SEM ISSO Prometheus nao consegue raspar
# Lista todas as portas que o pod expoe para outros servicos acessarem
service:
  ports:
  - name: otlp
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: otlp-http
    port: 4318
    targetPort: 4318
    protocol: TCP
  - name: jaeger-compact
    port: 6831
    targetPort: 6831
    protocol: UDP
  - name: jaeger-grpc
    port: 14250
    targetPort: 14250
    protocol: TCP
  - name: jaeger-thrift
    port: 14268
    targetPort: 14268
    protocol: TCP
  - name: zipkin
    port: 9411
    targetPort: 9411
    protocol: TCP
  - name: telemetry-metrics
    port: 8888
    targetPort: 8888
    protocol: TCP
  - name: prometheus-export
    port: 8889
    targetPort: 8889
    protocol: TCP
