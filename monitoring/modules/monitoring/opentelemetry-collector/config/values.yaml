# OpenTelemetry Collector - Configuration System
# =====================================================================
# O Collector e um agente/proxy que recebe, processa e exporta dados
# de telemetria (Traces, Metrics, Logs). Nesta configuracao padrao, ele
# roda em modo "deployment" (centralizado), recebendo OTLP e entregando
# traces para o Tempo e metricas para o Prometheus.
# =====================================================================
#
# [ATENCAO] PORTAS DO OTEL COLLECTOR:
# - 4317: OTLP gRPC (ingestao de traces/metricas/logs via protocolo OTel)
# - 4318: OTLP HTTP (ingestao de traces/metricas/logs via HTTP)
# - 8888: Metricas internas do proprio Collector (para Prometheus scrap)
# - 8889: Endpoint Prometheus exporter (para o Prometheus raspar metricas processadas)
# - 55680: OTLP legacy (apenas compatibilidade reversa)
#
# [ATENCAO] DIFERENCA CRITICA: Tempo x OTEL Collector
# O Tempo RECEBE dados na porta 4317 (OTLP gRPC) - mesma do Collector
# Mas o Tempo CONSULTA dados na porta 3100 (HTTP API)
# O Collector nunca e usado para consulta, apenas para ingestao

# Replicas da instancia do Collector centralizado.
# Em producao, esse valor pode subir conforme o volume de injecao de dados.
replicaCount: ${otel_collector_replica_count}

# O modo "deployment" executa o Collector como um Deploy do Kubernetes.
# Outras opcoes comuns:
# - daemonset: executa um pod por Node (bom para coletar logs/metricas do Host)
# - statefulset: executa pods com identidades persistentes (bom para escalonamento com persistencia)
mode: deployment

image:
  # Imagem da comunidade contendo todos os receptores/processadores extras (ex: AWS, K8s, Azure)
  repository: otel/opentelemetry-collector-contrib
  tag: 0.112.0

# Estrutura Principal de Configuracao do OpenTelemetry Collector
# Ela e dividida em: receivers, processors, exporters e service.
config:
  # --
  # RECEIVERS: Como o Collector recebe dados das aplicacoes
  # --
  receivers:
    # OTLP (OpenTelemetry Protocol): Padrao de industria gRPC e HTTP.
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317 # Porta padrao gRPC para receber dados de bibliotecas OTel
        http:
          endpoint: 0.0.0.0:4318 # Porta padrao HTTP para receber payloads JSON/protobuf

  # --
  # PROCESSORS: Como o Collector trata, enriquece ou limpa os dados
  # --
  processors:
    # O batch processor agrupa os dados antes de envia-los (reduz chamadas de rede e overhead)
    batch:
      timeout: 5s              # Tempo maximo de espera antes de forcar o envio de um lote
      send_batch_size: 1024    # Quantidade ideal de itens por lote

  # --
  # EXPORTERS: Para onde o Collector envia os dados processados
  # --
  exporters:
    # Envia traces via protocolo OTLP para o Tempo
    # [ATENCAO] Porta 4317 = OTLP gRPC do Tempo (ingestao de traces)
    # Nao confundir com porta 3100 (consulta HTTP, nao usada pelo Collector)
    otlp:
      endpoint: "tempo.monitoring.svc.cluster.local:4317"
      tls:
        insecure: true # Comunicacao HTTP dentro do cluster (sem SSL)
      sending_queue:
        enabled: true
        num_consumers: 4
        queue_size: 1000 # Fila de buffer interna caso o backend fique temporariamente indisponivel

    # Expoe um endpoint Prometheus para raspagem (Scraping) externa
    prometheus:
      endpoint: "0.0.0.0:8889"
      resource_to_telemetry_conversion:
        enabled: true # Converte atributos de recursos do OTel para labels do Prometheus

  # --
  # SERVICE: Conecta os componentes acima atraves de pipelines
  # --
  service:
    pipelines:
      # Pipeline de Tracing
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp]

      # Pipeline de Metricas
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [prometheus]

    # Habilita telemetria interna (metricas e logs do proprio Collector)
    telemetry:
      logs:
        level: "info"
      metrics:
        address: "0.0.0.0:8888" # Expoe porta 8888 para o Prometheus raspar as metricas do Collector

# Dimensionamento do recurso para o pod do Collector.
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
