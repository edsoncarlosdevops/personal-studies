# OpenTelemetry Collector - Configuration System
# =====================================================================
# O Collector recebe, processa e exporta dados de telemetria
# (Traces, Metrics, Logs). Modo deployment (centralizado).
#
# [ATENCAO] PORTAS:
# - 4317: OTLP gRPC (ingestao de traces/metricas/logs)
# - 4318: OTLP HTTP (ingestao alternativa via HTTP)
# - 8888: Telemetria do proprio Collector (metricas internas)
# - 8889: Endpoint Prometheus exporter (raspado pelo Prometheus)
#
# As portas 8888 e 8889 precisam ser adicionadas manualmente no service
# do Kubernetes apos o deploy (kubectl patch svc), pois o chart Helm
# do OTEL Collector nao suporta configuracao de portas no service.
#
# [ATENCAO] FLUXO DE DADOS:
# App (OTel SDK) -> Collector (:4317 gRPC) -> Tempo (:4317) [traces]
# App (OTel SDK) -> Collector (:4317 gRPC) -> Prometheus (:8889) [metricas]
# Prometheus raspa Collector em :8889/metrics

replicaCount: ${otel_collector_replica_count}

mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.112.0

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1024

  exporters:
    # Exporta traces para o Tempo (porta 4317 = OTLP gRPC)
    # [ATENCAO] Tempo usa 4317 para INGESTAO, 3100 para CONSULTA (Grafana)
    otlp:
      endpoint: "tempo.monitoring.svc.cluster.local:4317"
      tls:
        insecure: true
      sending_queue:
        enabled: true
        num_consumers: 4
        queue_size: 1000

    # Exporta metricas em formato Prometheus (raspado pelo Prometheus)
    # Porta 8889 precisa estar exposta no service do Kubernetes
    prometheus:
      endpoint: "0.0.0.0:8889"
      resource_to_telemetry_conversion:
        enabled: true

    # Exporta logs para o Loki via OTLP HTTP
    # Loki usa a porta 3100 para API HTTP (push/query)
    loki:
      endpoint: "loki.monitoring.svc.cluster.local:3100/otlp/v1/logs"
      tls:
        insecure: true
      sending_queue:
        enabled: true
        num_consumers: 4
        queue_size: 1000

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp]
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [prometheus]
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [loki]

    telemetry:
      logs:
        level: "info"
      metrics:
        address: "0.0.0.0:8888"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
