# OpenTelemetry Collector - Configuration System
# =====================================================================
# O Collector recebe, processa e exporta dados de telemetria
# (Traces, Metrics). Modo deployment (centralizado no namespace monitoring).
#
# Fluxo de dados:
#   App (OTel SDK) -> Collector (:4317 gRPC) -> Tempo (:4317) [traces]
#   App (OTel SDK) -> Collector (:4317 gRPC) -> Prometheus (:8889) [metricas]
#
# [ATENCAO] PORTAS:
# - 4317: OTLP gRPC (ingestao de traces/metricas)
# - 4318: OTLP HTTP (ingestao alternativa via HTTP)
# - 8888: Telemetria do proprio Collector (metricas internas - scrape pelo Prometheus)
# - 8889: Endpoint Prometheus exporter (raspado pelo Prometheus para metricas da app)
#
# [ATENCAO] LOGS:
# A pipeline de logs esta desabilitada propositalmente.
# Logs sao coletados pelo Promtail (le stdout/stderr dos pods em /var/log/pods/).
# =====================================================================
replicaCount: ${otel_collector_replica_count}

mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.112.0

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1024

  exporters:
    # Exporta traces para o Tempo via OTLP gRPC (porta 4317)
    # [ATENCAO] Tempo usa 4317 para INGESTAO, 3100 para CONSULTA (Grafana)
    otlp:
      endpoint: "tempo.monitoring.svc.cluster.local:4317"
      tls:
        insecure: true
      sending_queue:
        enabled: true
        num_consumers: 4
        queue_size: 1000

    # Exporta metricas em formato Prometheus (raspado pelo Prometheus em :8889/metrics)
    prometheus:
      endpoint: "0.0.0.0:8889"
      resource_to_telemetry_conversion:
        enabled: true

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp]
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [prometheus]
    telemetry:
      logs:
        level: "info"
      metrics:
        address: "0.0.0.0:8888"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

