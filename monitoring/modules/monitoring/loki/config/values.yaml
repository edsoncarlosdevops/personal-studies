# ═══════════════════════════════════════════════════════════
# Loki - Values para Helm Chart
# ═══════════════════════════════════════════════════════════
#
# ATENÇÃO: path_prefix e permissões de escrita
# - O container do Loki roda como user não-root (UID 10001)
# - O diretório /var/loki NÃO é writable pelo user não-root
#   na imagem padrão quando sem persistência (emptyDir)
# - Solução: usar /tmp/loki como path_prefix, já que /tmp
#   tem um emptyDir montado e permissão correta
#
# ATENÇÃO: StorageClass no EKS
# - StorageClass "gp2" com volumeBindingMode: WaitForFirstConsumer
# - Se habilitar persistência, usar storageClass: "gp2"
# - Para lab, manter persistence.enabled: false

# --- Configurações de Nível Raiz (IMPORTANTE: Não indentar) ---
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  
  commonConfig:
    replication_factor: 1
    # path_prefix usa /tmp/loki pois /var/loki é read-only
    # para o user não-root do container Loki
    path_prefix: /tmp/loki

  # Armazenamento no disco local (Filesystem)
  storage:
    type: "filesystem"
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules
  
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

# --- Configuração do Modo SingleBinary ---
singleBinary:
  replicas: 1
  persistence:
    enabled: false # Desabilitado para lab. Se habilitar, usar storageClass: "gp2"
  # Recursos leves para EKS (t3.medium)
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

# --- Desabilitar explicitamente componentes distribuídos ---
# Necessário para SingleBinary em modo local (sem S3)
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
gateway:
  enabled: false
resultsCache:
  enabled: false
chunksCache:
  enabled: false

