# Grafana Loki - Configuration System
# =====================================================================
# Loki e um sistema de agregacao de logs. Indexa apenas metadados
# (labels), nao o texto completo, tornando o armazenamento barato.
#
# Modo SingleBinary (sem gateway, sem backend/read/write separados).
# Ideal para ambientes dev/lab.
#
# Fluxo:
#   Pod (stdout) -> /var/log/pods/ -> Promtail -> Loki (:3100) -> Grafana
#
# [ATENCAO] path_prefix:
# O container do Loki roda como user nao-root (UID 10001).
# /var/loki NAO e writable por este user. Usar /tmp/loki como prefix.
#
# [ATENCAO] PORTAS:
# - 3100: http_listen_port (API de consulta/ingestao - usada pelo Grafana e Promtail)
# - 9095: gRPC interno (comunicacao entre componentes, nao exposto)
#
# [ATENCAO] GATEWAY DESABILITADO:
# Como usamos SingleBinary, o gateway e desnecessario.
# O Promtail envia logs diretamente para loki:3100/loki/api/v1/push.
# =====================================================================
deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1
    path_prefix: /tmp/loki

  storage:
    type: "filesystem"
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  # Ingestao via OTLP desabilitada
  # Logs sao coletados pelo Promtail via HTTP push, nao via OTel SDK
  otlp_config:
    logs:
      enabled: false

testing:
  enabled: false

loki-canary:
  enabled: false

  server:
    http_listen_port: 3100
    grpc_listen_port: 9095

singleBinary:
  replicas: 1
  persistence:
    enabled: false

  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
gateway:
  enabled: false
resultsCache:
  enabled: false
chunksCache:
  enabled: false

