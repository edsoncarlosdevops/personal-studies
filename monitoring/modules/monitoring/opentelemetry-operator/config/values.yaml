# OpenTelemetry Operator - Configuration System (Production Ready)
# =====================================================================
# O OpenTelemetry Operator gerencia automaticamente a injecao de
# agentes OTel nos Pods atraves de annotations, sem modificar
# o codigo das aplicacoes.

replicaCount: 1

manager:
  collectorImage:
    repository: otel/opentelemetry-collector-contrib
    tag: 0.112.0

  env:
    # Habilita auto-instrumentacao (injeta agent OTel em Pods com annotations)
    - name: ENABLE_WEBHOOKS
      value: "true"
