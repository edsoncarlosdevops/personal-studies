# Grafana Tempo - Configuration System
# =====================================================================
# Tempo e um banco de dados de tracing distribuido.
# Modo monolithic (single binary) para ambiente dev/lab.
#
# Fluxo de dados:
#   App (OTel SDK) -> OTEL Collector (:4317) -> Tempo (:4317 OTLP gRPC)
#   Grafana -> Tempo (:3100) para consultar traces
#
# [ATENCAO] PORTAS:
# - 3100: http_listen_port (API de consulta de traces - USADA PELO GRAFANA)
# - 4317: OTLP gRPC (ingestao de traces - USADA PELO OTEL COLLECTOR)
# - 4318: OTLP HTTP (ingestao de traces alternativa)
# - 3200: NAO EXISTE (causa Bad Gateway se configurado no Grafana)
# =====================================================================
mode: monolithic

tempo:
  yaml:
    multitenancy_enabled: false

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    server:
      http_listen_port: 3100

    compactor:
      compaction:
        block_retention: 24h

persistence:
  enabled: false

# --- Recursos do Tempo ---
# VALORES AJUSTADOS baseados no consumo real observado (Jun/2026):
#   Consumo real de CPU: ~2m  (pico ~50m)
#   Consumo real de RAM: ~529MB (pico ~700MB)
#
# Antes: request 256Mi de RAM com consumo real 529Mi (206% do request).
# Tempo e stateful: mantem traces em memoria antes de flush para o S3.
# Quanto mais trafego, mais memoria. O request precisa considerar isso.
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 768Mi

